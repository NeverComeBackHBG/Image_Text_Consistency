# ========================================
# 图文相似度分析 - 配置文件
# ========================================

# 模型配置
models:
  # 文本向量化模型（BGE-M3）
  # 首次运行时会自动从HuggingFace下载
  bge_model: "BAAI/bge-m3"

  # 视觉模型配置
  vision:
    # 提供商：ollama（本地，社区镜像已安装）
    provider: "ollama"

    # 模型名称（社区镜像可能已预装）
    # 可以先运行 ollama list 查看可用模型
    #   - qwen2.5-vl:7b-instruct
    #   - qwen2.5-vl:3b-instruct
    #   - llava:7b
    model: "qwen2.5-vl:7b-instruct"

    # Ollama API地址
    base_url: "http://localhost:11434"

    # 如果使用HuggingFace本地模型：
    # provider: "huggingface"
    # model: "Qwen/Qwen2-VL-7B-Instruct"
    # cache_dir: "./models"

    # 如果使用OpenRouter云端API：
    # provider: "openrouter"
    # model: "qwen/qwen2.5-vl-7b-instruct"
    # api_key: "${OPENROUTER_API_KEY}"

# HanLP配置
hanlp:
  pretrained: "standard"
  cache_dir: "./models/hanlp"

# BGE-M3配置
bge:
  cache_dir: "./models/bge"

# 处理配置
processing:
  batch_size: 1
  timeout: 120

# 输出配置
output:
  dir: "data/output"
  format: "json"
  include_details: true
