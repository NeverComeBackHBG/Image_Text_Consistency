# ========================================
# 图文相似度分析 - 配置文件
# ========================================

# 模型配置
models:
  # 文本向量化模型（BGE-M3）
  # 首次运行时会自动从HuggingFace下载
  bge_model: "BAAI/bge-m3"

  # 视觉模型配置
  vision:
    # 提供商选择：
    # - "autodl": AutoDL社区镜像预装模型（推荐， fastest）
    # - "ollama": 本地Ollama服务
    # - "huggingface": HuggingFace本地模型
    # - "openrouter": 云端API
    provider: "autodl"

    # AutoDL社区镜像预装模型路径
    # 镜像: Qwen2.5-VL-7B-Instruct
    local_model_path: "/root/models/Qwen2.5-VL-7B-Instruct"

    # Ollama 模型名称（如使用ollama）
    model: "qwen2.5-vl:7b-instruct"

    # Ollama API地址
    base_url: "http://localhost:11434"

    # 如果使用HuggingFace本地模型：
    # provider: "huggingface"
    # model: "Qwen/Qwen2-VL-7B-Instruct"
    # cache_dir: "./models"

    # 如果使用OpenRouter云端API：
    # provider: "openrouter"
    # model: "qwen/qwen2.5-vl-7b-instruct"
    # api_key: "${OPENROUTER_API_KEY}"

# HanLP配置
hanlp:
  pretrained: "standard"
  cache_dir: "./models/hanlp"

# BGE-M3配置
bge:
  cache_dir: "./models/bge"

# 处理配置
processing:
  batch_size: 1
  timeout: 120

# 输出配置
output:
  dir: "data/output"
  format: "json"
  include_details: true
